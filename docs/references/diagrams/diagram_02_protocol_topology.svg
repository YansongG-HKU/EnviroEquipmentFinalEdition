<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="'Noto Sans SC Thin','Noto Sans SC','Droid Sans Fallback',sans-serif">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E141C"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3FBDD0"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="url(#bgP)"/>

  <text x="700" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#E6ECF5" letter-spacing="2">通信协议拓扑与适配</text>
  <text x="700" y="70" text-anchor="middle" font-size="12" fill="#7A8699" letter-spacing="6">UNIFIED IPlcClient INTERFACE · MULTI-PROTOCOL ADAPTERS</text>

  <!-- Top: Business -->
  <g transform="translate(440,110)">
    <rect width="520" height="80" fill="#11151C" stroke="#E0A04A" stroke-width="1.4" rx="3"/>
    <text x="260" y="32" text-anchor="middle" font-size="11" fill="#E0A04A" letter-spacing="2">BUSINESS LAYER 业务层</text>
    <text x="260" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#E6ECF5">采集调度 · 控制服务 · 程序服务 · 报警评估</text>
  </g>

  <!-- Unified API -->
  <g transform="translate(360,230)">
    <rect width="680" height="64" fill="#11151C" stroke="#3FBDD0" stroke-width="1.6" rx="3"/>
    <text x="340" y="26" text-anchor="middle" font-size="11" fill="#3FBDD0" letter-spacing="2">UNIFIED INTERFACE 统一通信接口  ·  IPlcClient</text>
    <text x="340" y="50" text-anchor="middle" font-size="12" fill="#A6B0C2">connect() · disconnect() · read(items) · write(items) · is_connected()</text>
  </g>

  <!-- Down arrows -->
  <g stroke="#3FBDD0" stroke-width="1.4" fill="none" marker-end="url(#arrP)">
    <path d="M 700 190 L 700 230"/>
    <path d="M 240 360 L 240 320 L 480 320 L 480 296"/>
    <path d="M 700 360 L 700 296"/>
    <path d="M 1160 360 L 1160 320 L 920 320 L 920 296"/>
  </g>

  <!-- Adapters row -->
  <g transform="translate(80,360)">
    <rect width="320" height="100" fill="#11151C" stroke="#7E5BFF" stroke-width="1.2" rx="3"/>
    <rect width="6" height="100" fill="#7E5BFF"/>
    <text x="160" y="28" text-anchor="middle" font-size="11" fill="#7E5BFF" letter-spacing="2">MODBUS ADAPTER</text>
    <text x="160" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#E6ECF5">pymodbus / nModbus</text>
    <text x="160" y="76" text-anchor="middle" font-size="10" fill="#7A8699">FC03 / FC04 / FC06 / FC16</text>
    <text x="160" y="92" text-anchor="middle" font-size="10" fill="#7A8699">超时 · 重连 · 字节序处理</text>
  </g>

  <g transform="translate(540,360)">
    <rect width="320" height="100" fill="#11151C" stroke="#3FBDD0" stroke-width="1.2" rx="3"/>
    <rect width="6" height="100" fill="#3FBDD0"/>
    <text x="160" y="28" text-anchor="middle" font-size="11" fill="#3FBDD0" letter-spacing="2">S7 ADAPTER · 200 SMART</text>
    <text x="160" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#E6ECF5">snap7 / S7NetPlus</text>
    <text x="160" y="76" text-anchor="middle" font-size="10" fill="#7A8699">V存储 / DB / I / Q / M</text>
    <text x="160" y="92" text-anchor="middle" font-size="10" fill="#7A8699">CPU 槽位 0 · 默认 102 端口</text>
  </g>

  <g transform="translate(1000,360)">
    <rect width="320" height="100" fill="#11151C" stroke="#3FBDD0" stroke-width="1.2" rx="3"/>
    <rect width="6" height="100" fill="#3FBDD0"/>
    <text x="160" y="28" text-anchor="middle" font-size="11" fill="#3FBDD0" letter-spacing="2">S7 ADAPTER · 1500</text>
    <text x="160" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#E6ECF5">snap7 / S7NetPlus (优化 DB)</text>
    <text x="160" y="76" text-anchor="middle" font-size="10" fill="#7A8699">非优化 DB 访问 · OUC</text>
    <text x="160" y="92" text-anchor="middle" font-size="10" fill="#7A8699">支持高速循环采集</text>
  </g>

  <!-- Down to PLC -->
  <g stroke="#7A8699" stroke-width="1" fill="none" marker-end="url(#arrP)">
    <path d="M 240 460 L 240 520"/>
    <path d="M 700 460 L 700 520"/>
    <path d="M 1160 460 L 1160 520"/>
  </g>
  <text x="240" y="495" text-anchor="middle" font-size="9" fill="#7A8699" letter-spacing="2">TCP/RTU</text>
  <text x="700" y="495" text-anchor="middle" font-size="9" fill="#7A8699" letter-spacing="2">S7 / TCP</text>
  <text x="1160" y="495" text-anchor="middle" font-size="9" fill="#7A8699" letter-spacing="2">S7 / TCP</text>

  <!-- PLC row -->
  <g transform="translate(80,520)">
    <rect width="320" height="80" fill="#161B24" stroke="#3A4458" rx="3"/>
    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#E6ECF5">施耐德 Modicon M221</text>
    <text x="160" y="56" text-anchor="middle" font-size="10" fill="#A6B0C2">标准温湿型 · 低气压型 · 温冲型</text>
  </g>
  <g transform="translate(540,520)">
    <rect width="320" height="80" fill="#161B24" stroke="#3A4458" rx="3"/>
    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#E6ECF5">西门子 S7-200 SMART</text>
    <text x="160" y="56" text-anchor="middle" font-size="10" fill="#A6B0C2">标准温湿型 · 低气压型 · 温冲型</text>
  </g>
  <g transform="translate(1000,520)">
    <rect width="320" height="80" fill="#161B24" stroke="#3A4458" rx="3"/>
    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#E6ECF5">西门子 S7-1500</text>
    <text x="160" y="56" text-anchor="middle" font-size="10" fill="#A6B0C2">标准温湿型 · 低气压型 · 温冲型</text>
  </g>

  <!-- Test matrix at bottom -->
  <g transform="translate(80,640)">
    <text x="0" y="0" font-size="11" fill="#3FBDD0" letter-spacing="3">测试矩阵 · 3 PLC × 3 设备型号 = 9 联调组合</text>
    <g font-size="10" fill="#A6B0C2">
      <rect x="0" y="14" width="1240" height="74" fill="none" stroke="#2A3240"/>
      <line x1="320" y1="14" x2="320" y2="88" stroke="#2A3240"/>
      <line x1="640" y1="14" x2="640" y2="88" stroke="#2A3240"/>
      <line x1="960" y1="14" x2="960" y2="88" stroke="#2A3240"/>
      <line x1="0" y1="40" x2="1240" y2="40" stroke="#2A3240"/>
      <text x="160" y="32" text-anchor="middle" fill="#7A8699" letter-spacing="2">PLC \\ 设备类型</text>
      <text x="480" y="32" text-anchor="middle" fill="#E6ECF5">标准温湿型</text>
      <text x="800" y="32" text-anchor="middle" fill="#E6ECF5">低气压型</text>
      <text x="1120" y="32" text-anchor="middle" fill="#E6ECF5">温度冲击型</text>

      <text x="160" y="64" text-anchor="middle" fill="#E6ECF5">施耐德 M221</text>
      <text x="480" y="64" text-anchor="middle" fill="#35C26B">● 测试</text>
      <text x="800" y="64" text-anchor="middle" fill="#35C26B">● 测试</text>
      <text x="1120" y="64" text-anchor="middle" fill="#35C26B">● 测试</text>
    </g>
  </g>
</svg>
