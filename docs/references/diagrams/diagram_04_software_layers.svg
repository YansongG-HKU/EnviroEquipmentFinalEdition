<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="'Noto Sans SC Thin','Noto Sans SC','Droid Sans Fallback',sans-serif">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E141C"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3FBDD0"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="url(#bgL)"/>

  <text x="700" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#E6ECF5" letter-spacing="2">软件分层与模块依赖关系</text>
  <text x="700" y="70" text-anchor="middle" font-size="12" fill="#7A8699" letter-spacing="6">UNI-DIRECTIONAL DEPENDENCY · STRICT LAYERING</text>

  <!-- Layer 1: UI -->
  <g transform="translate(80,110)">
    <rect width="1240" height="100" fill="#0F1722" stroke="#3FBDD0" stroke-width="1.4" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#3FBDD0" letter-spacing="3">L1 · UI 界面层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">总览监控</text>
      </g>
      <g transform="translate(150,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">当前试验</text>
      </g>
      <g transform="translate(280,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">程序编辑</text>
      </g>
      <g transform="translate(410,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">历史试验</text>
      </g>
      <g transform="translate(540,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">报警中心</text>
      </g>
      <g transform="translate(670,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">LIMS / 黑灯</text>
      </g>
      <g transform="translate(800,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">监控布局</text>
      </g>
      <g transform="translate(930,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">设备接入</text>
      </g>
      <g transform="translate(1060,46)">
        <rect width="120" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="60" y="26" text-anchor="middle">用户与权限</text>
      </g>
    </g>
  </g>

  <!-- Layer 2: Core / Business -->
  <g transform="translate(80,250)">
    <rect width="1240" height="100" fill="#0F1722" stroke="#E0A04A" stroke-width="1.4" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#E0A04A" letter-spacing="3">L2 · CORE 业务核心层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">设备模型 Device</text></g>
      <g transform="translate(190,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">通道 Channel</text></g>
      <g transform="translate(360,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">控制 Control</text></g>
      <g transform="translate(530,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">程序 Program</text></g>
      <g transform="translate(700,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">报警 Alarm</text></g>
      <g transform="translate(870,46)"><rect width="160" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="80" y="26" text-anchor="middle">曲线 Curve</text></g>
      <g transform="translate(1040,46)"><rect width="180" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="26" text-anchor="middle">采集调度 Scheduler</text></g>
    </g>
  </g>

  <!-- Layer 3: Communication / Config / Data -->
  <g transform="translate(80,390)">
    <rect width="400" height="170" fill="#0F1722" stroke="#3FBDD0" stroke-width="1.2" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#3FBDD0" letter-spacing="3">L3 · COMMUNICATION 通信层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">IPlcClient (统一接口)</text></g>
      <g transform="translate(200,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">Parser (解析器)</text></g>
      <g transform="translate(20,98)"><rect width="170" height="42" fill="#11151C" stroke="#7E5BFF" rx="2"/><text x="85" y="26" text-anchor="middle">Modbus 适配器</text></g>
      <g transform="translate(200,98)"><rect width="170" height="42" fill="#11151C" stroke="#3FBDD0" rx="2"/><text x="85" y="26" text-anchor="middle">S7 适配器</text></g>
    </g>
  </g>

  <g transform="translate(500,390)">
    <rect width="400" height="170" fill="#0F1722" stroke="#E0A04A" stroke-width="1.2" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#E0A04A" letter-spacing="3">L3 · CONFIG 配置层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">设备配置</text></g>
      <g transform="translate(200,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">协议 XML</text></g>
      <g transform="translate(20,98)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">i18n 中英文</text></g>
      <g transform="translate(200,98)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">备份 / 恢复</text></g>
    </g>
  </g>

  <g transform="translate(920,390)">
    <rect width="400" height="170" fill="#0F1722" stroke="#7E5BFF" stroke-width="1.2" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#7E5BFF" letter-spacing="3">L3 · DATA 数据层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">实时缓存</text></g>
      <g transform="translate(200,46)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">CSV 写入 / 分段</text></g>
      <g transform="translate(20,98)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">索引 / 检索</text></g>
      <g transform="translate(200,98)"><rect width="170" height="42" fill="#11151C" stroke="#2A3240" rx="2"/><text x="85" y="26" text-anchor="middle">导出 / 重采样</text></g>
    </g>
  </g>

  <!-- Layer 4: Foundation -->
  <g transform="translate(80,600)">
    <rect width="1240" height="80" fill="#0F1722" stroke="#35C26B" stroke-width="1.2" rx="3"/>
    <text x="20" y="28" font-size="11" fill="#35C26B" letter-spacing="3">L4 · FOUNDATION 基础支撑层</text>
    <g font-size="11" fill="#E6ECF5">
      <g transform="translate(20,38)"><rect width="180" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="20" text-anchor="middle">日志 Log</text></g>
      <g transform="translate(210,38)"><rect width="180" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="20" text-anchor="middle">异常处理</text></g>
      <g transform="translate(400,38)"><rect width="180" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="20" text-anchor="middle">线程 / 任务调度</text></g>
      <g transform="translate(590,38)"><rect width="180" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="20" text-anchor="middle">资源管理</text></g>
      <g transform="translate(780,38)"><rect width="180" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="90" y="20" text-anchor="middle">权限 / 审计</text></g>
      <g transform="translate(970,38)"><rect width="250" height="32" fill="#11151C" stroke="#2A3240" rx="2"/><text x="125" y="20" text-anchor="middle">Tools · ProtocolEditor 协议工具</text></g>
    </g>
  </g>

  <!-- Vertical dependency arrows (downward only) -->
  <g stroke="#3FBDD0" stroke-width="1.2" fill="none" marker-end="url(#arrL)" stroke-dasharray="2,3">
    <path d="M 700 210 L 700 250"/>
    <path d="M 280 350 L 280 390"/>
    <path d="M 700 350 L 700 390"/>
    <path d="M 1120 350 L 1120 390"/>
    <path d="M 700 560 L 700 600"/>
  </g>

  <text x="700" y="710" text-anchor="middle" font-size="11" fill="#7A8699" letter-spacing="2">依赖方向单向：UI → Core → (Comm / Config / Data) → Foundation。通信层不感知界面，便于独立单元测试与替换。</text>
  <text x="700" y="730" text-anchor="middle" font-size="11" fill="#7A8699" letter-spacing="2">同层不互调：例如 Modbus 与 S7 之间没有依赖，新增 PLC 协议时不影响已上线驱动。</text>
</svg>
