<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="'Noto Sans SC Thin','Noto Sans SC','Droid Sans Fallback',sans-serif">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E141C"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <marker id="arrS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3FBDD0"/>
    </marker>
  </defs>
  <rect width="1400" height="720" fill="url(#bgS)"/>

  <text x="700" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#E6ECF5" letter-spacing="2">关键状态机：通信状态 · 控制权限</text>
  <text x="700" y="70" text-anchor="middle" font-size="12" fill="#7A8699" letter-spacing="6">UNIFIED STATE MANAGEMENT</text>

  <!-- ============ Communication state machine ============ -->
  <text x="80" y="125" font-size="14" fill="#3FBDD0" letter-spacing="2">[1] 通信状态机  Communication State Machine</text>
  <g transform="translate(80,150)">
    <rect width="640" height="500" fill="#0F1722" stroke="#1E2430" rx="3"/>

    <!-- States -->
    <g font-size="12" fill="#E6ECF5" text-anchor="middle">
      <g transform="translate(120,80)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#5C6573" stroke-width="1.4"/>
        <text dy="5">未连接</text>
      </g>
      <g transform="translate(320,80)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#E0A04A" stroke-width="1.4"/>
        <text dy="5">连接中</text>
      </g>
      <g transform="translate(520,80)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#5C6573" stroke-width="1.4"/>
        <text dy="5">离线</text>
      </g>
      <g transform="translate(320,200)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#35C26B" stroke-width="1.6"/>
        <text dy="5">在线</text>
      </g>
      <g transform="translate(520,320)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#3FBDD0" stroke-width="1.6"/>
        <text dy="5">采集中</text>
      </g>
      <g transform="translate(120,320)">
        <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#161B24" stroke="#E0A04A" stroke-width="1.4"/>
        <text dy="5">重连中</text>
      </g>
    </g>

    <!-- Transitions -->
    <g stroke="#3FBDD0" stroke-width="1.2" fill="none" marker-end="url(#arrS)">
      <path d="M 180 80 L 260 80"/>
      <path d="M 380 80 L 460 80"/>
      <path d="M 320 102 L 320 178"/>
      <path d="M 380 200 L 460 220 L 502 298"/>
      <path d="M 460 320 L 180 320"/>
      <path d="M 120 298 L 120 102"/>
      <path d="M 175 320 L 270 222"/>
    </g>

    <g font-size="10" fill="#7A8699">
      <text x="220" y="68">开始连接</text>
      <text x="420" y="68">连接失败</text>
      <text x="335" y="148">连接成功</text>
      <text x="430" y="265">启动采集</text>
      <text x="320" y="338">读写超时</text>
      <text x="50" y="200">手动/自动重连</text>
      <text x="180" y="280">重连成功</text>
    </g>

    <text x="320" y="430" text-anchor="middle" font-size="11" fill="#A6B0C2">设备状态由通信层统一上报，业务层订阅，界面层只渲染。</text>
    <text x="320" y="450" text-anchor="middle" font-size="11" fill="#A6B0C2">单台设备通信异常不影响其他设备运行。</text>
    <text x="320" y="476" text-anchor="middle" font-size="10" fill="#7A8699">CommunicationState ∈ { Disconnected, Connecting, Online, Acquiring, Reconnecting, Offline }</text>
  </g>

  <!-- ============ Control mode state machine ============ -->
  <text x="760" y="125" font-size="14" fill="#3FBDD0" letter-spacing="2">[2] 控制权限状态机  Control Mode</text>
  <g transform="translate(760,150)">
    <rect width="560" height="500" fill="#0F1722" stroke="#1E2430" rx="3"/>

    <g font-size="12" fill="#E6ECF5" text-anchor="middle">
      <g transform="translate(280,80)">
        <rect x="-70" y="-22" width="140" height="44" rx="22" fill="#161B24" stroke="#5C6573" stroke-width="1.4"/>
        <text dy="5">未知 Unknown</text>
      </g>
      <g transform="translate(140,240)">
        <rect x="-70" y="-22" width="140" height="44" rx="22" fill="#161B24" stroke="#E0A04A" stroke-width="1.4"/>
        <text dy="5">本地 Local</text>
      </g>
      <g transform="translate(420,240)">
        <rect x="-70" y="-22" width="140" height="44" rx="22" fill="#161B24" stroke="#35C26B" stroke-width="1.6"/>
        <text dy="5">远程 Remote</text>
      </g>
    </g>

    <g stroke="#3FBDD0" stroke-width="1.2" fill="none" marker-end="url(#arrS)">
      <path d="M 240 102 L 170 218"/>
      <path d="M 320 102 L 390 218"/>
      <path d="M 210 240 L 350 240"/>
      <path d="M 350 250 L 210 250"/>
      <path d="M 140 218 L 240 102"/>
      <path d="M 420 218 L 320 102"/>
    </g>

    <g font-size="10" fill="#7A8699">
      <text x="160" y="170">触摸屏切本地</text>
      <text x="345" y="170">触摸屏切远程</text>
      <text x="280" y="232" text-anchor="middle">切换为远程</text>
      <text x="280" y="270" text-anchor="middle">切换为本地</text>
      <text x="60" y="135">通信中断</text>
      <text x="425" y="135">通信中断</text>
    </g>

    <g transform="translate(40,360)">
      <rect width="480" height="120" fill="#161B24" stroke="#2A3240"/>
      <text x="20" y="22" font-size="11" fill="#E0A04A">! 控制下发的四级前置校验</text>
      <text x="20" y="44" font-size="10" fill="#A6B0C2">[1] 设备是否在线（Communication == Online/Acquiring）</text>
      <text x="20" y="62" font-size="10" fill="#A6B0C2">[2] 设备是否远程模式（ControlMode == Remote）</text>
      <text x="20" y="80" font-size="10" fill="#A6B0C2">[3] 输入参数是否在合法范围（Channel.limit 校验）</text>
      <text x="20" y="98" font-size="10" fill="#A6B0C2">[4] 当前运行状态是否允许（如运行中禁改某些参数）</text>
      <text x="20" y="114" font-size="10" fill="#7A8699">→ 任一不通过，按钮置灰且给出提示原因；不静默失败。</text>
    </g>
  </g>
</svg>
