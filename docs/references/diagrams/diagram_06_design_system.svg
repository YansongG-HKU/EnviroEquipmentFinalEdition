<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Noto Sans SC Thin','Noto Sans SC','Droid Sans Fallback',sans-serif">
  <defs>
    <linearGradient id="bgDS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E141C"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bgDS)"/>

  <text x="700" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#E6ECF5" letter-spacing="2">设计系统：色彩 · 字体 · 状态语言 · 曲线色</text>
  <text x="700" y="70" text-anchor="middle" font-size="12" fill="#7A8699" letter-spacing="6">DESIGN TOKENS · MISSION-CRITICAL DARK THEME</text>

  <!-- ============ Surfaces ============ -->
  <text x="80" y="120" font-size="11" fill="#3FBDD0" letter-spacing="3">SURFACES · 底层背景</text>
  <g font-size="10" fill="#A6B0C2">
    <g transform="translate(80,135)">
      <rect width="170" height="80" fill="#07090D" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-0  Deep</text>
      <text x="14" y="40">#07090D</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">最深背景 · App body</text>
    </g>
    <g transform="translate(260,135)">
      <rect width="170" height="80" fill="#0E141C" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-1</text>
      <text x="14" y="40">#0E141C</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">主工作区</text>
    </g>
    <g transform="translate(440,135)">
      <rect width="170" height="80" fill="#11151C" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-2</text>
      <text x="14" y="40">#11151C</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">面板 / 卡片</text>
    </g>
    <g transform="translate(620,135)">
      <rect width="170" height="80" fill="#161B24" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-3</text>
      <text x="14" y="40">#161B24</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">嵌套 / 输入</text>
    </g>
    <g transform="translate(800,135)">
      <rect width="170" height="80" fill="#1B2230" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-4</text>
      <text x="14" y="40">#1B2230</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">提升态 · hover</text>
    </g>
    <g transform="translate(980,135)">
      <rect width="170" height="80" fill="#242B36" stroke="#2A3240"/>
      <text x="14" y="22" fill="#E6ECF5" font-size="11">bg-5</text>
      <text x="14" y="40">#242B36</text>
      <text x="14" y="68" fill="#7A8699" font-size="9">表头 / 顶栏</text>
    </g>
  </g>

  <!-- ============ Text colors ============ -->
  <text x="80" y="250" font-size="11" fill="#3FBDD0" letter-spacing="3">TEXT · 文字层级</text>
  <g transform="translate(80,265)">
    <rect width="1070" height="80" fill="#0F1722" stroke="#2A3240"/>
    <g font-size="11">
      <g transform="translate(20,30)">
        <text fill="#E6ECF5" font-size="20">Aa 主文本</text>
        <text y="22" fill="#7A8699" font-size="9">txt-0  #E6ECF5</text>
      </g>
      <g transform="translate(220,30)">
        <text fill="#A6B0C2" font-size="18">Aa 次文本</text>
        <text y="22" fill="#7A8699" font-size="9">txt-1  #A6B0C2</text>
      </g>
      <g transform="translate(420,30)">
        <text fill="#7A8699" font-size="16">Aa 弱文本</text>
        <text y="22" fill="#7A8699" font-size="9">txt-2  #7A8699</text>
      </g>
      <g transform="translate(620,30)">
        <text fill="#4F596E" font-size="14">Aa 注释</text>
        <text y="22" fill="#7A8699" font-size="9">txt-3  #4F596E</text>
      </g>
      <g transform="translate(820,30)">
        <text fill="#363F4F" font-size="12">Aa 占位</text>
        <text y="22" fill="#7A8699" font-size="9">txt-4  #363F4F</text>
      </g>
    </g>
  </g>

  <!-- ============ Status palette ============ -->
  <text x="80" y="385" font-size="11" fill="#3FBDD0" letter-spacing="3">STATUS · 状态语言（颜色 + 形状双通道）</text>
  <g transform="translate(80,400)" font-size="11" fill="#E6ECF5">
    <g transform="translate(0,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#35C26B" stroke-width="1.4" rx="2"/>
      <circle cx="20" cy="30" r="6" fill="#35C26B"/>
      <text x="36" y="34">OK · 正常</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#35C26B · 圆点</text>
    </g>
    <g transform="translate(190,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#3FBDD0" stroke-width="1.4" rx="2"/>
      <circle cx="20" cy="30" r="6" fill="#3FBDD0"/>
      <text x="36" y="34">RUN · 运行中</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#3FBDD0 · 呼吸圆点</text>
    </g>
    <g transform="translate(380,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#4A6B8A" stroke-width="1.4" rx="2"/>
      <rect x="14" y="24" width="12" height="12" fill="#4A6B8A"/>
      <text x="36" y="34">SCHED · 待命</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#4A6B8A · 方块</text>
    </g>
    <g transform="translate(570,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#E0A04A" stroke-width="1.4" rx="2"/>
      <polygon points="20,24 32,36 8,36" fill="#E0A04A"/>
      <text x="36" y="34">PAUSE · 暂停</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#E0A04A · 三角</text>
    </g>
    <g transform="translate(760,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#E0433A" stroke-width="1.4" rx="2"/>
      <circle cx="20" cy="30" r="6" fill="#E0433A"/>
      <text x="36" y="34">ALARM · 报警</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#E0433A · 闪烁</text>
    </g>
    <g transform="translate(950,0)">
      <rect width="180" height="70" fill="#11151C" stroke="#5C6573" stroke-width="1.4" rx="2"/>
      <circle cx="20" cy="30" r="6" fill="#5C6573"/>
      <text x="36" y="34">OFFLINE · 离线</text>
      <text x="20" y="56" fill="#7A8699" font-size="9">#5C6573 · 灰圆点</text>
    </g>
  </g>

  <!-- ============ Chart series ============ -->
  <text x="80" y="510" font-size="11" fill="#3FBDD0" letter-spacing="3">CHART SERIES · 曲线色（高对比 · 限定五色避免视觉过载）</text>
  <g transform="translate(80,525)">
    <rect width="1240" height="100" fill="#0F1722" stroke="#2A3240"/>
    <!-- Mini chart preview -->
    <g transform="translate(20,15)">
      <line x1="0" y1="80" x2="600" y2="80" stroke="#2A3240" stroke-dasharray="2,3"/>
      <line x1="0" y1="40" x2="600" y2="40" stroke="#2A3240" stroke-dasharray="2,3"/>
      <polyline fill="none" stroke="#FF6B6B" stroke-width="2" points="0,60 60,55 120,40 180,30 240,25 300,28 360,40 420,55 480,65 540,70 600,68"/>
      <polyline fill="none" stroke="#3FBDD0" stroke-width="2" points="0,30 60,40 120,55 180,60 240,55 300,45 360,35 420,30 480,40 540,50 600,55"/>
      <polyline fill="none" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,3" points="0,75 60,72 120,72 180,72 240,72 300,72 360,72 420,72 480,72 540,72 600,72"/>
      <text x="0" y="98" font-size="9" fill="#7A8699">实时趋势预览（多通道叠加 + 设定值参考线）</text>
    </g>
    <!-- swatches -->
    <g transform="translate(680,30)" font-size="11" fill="#E6ECF5">
      <g><rect width="16" height="16" fill="#FF6B6B"/><text x="24" y="13">温度  Temperature</text><text x="24" y="28" font-size="9" fill="#7A8699">#FF6B6B</text></g>
      <g transform="translate(0,40)"><rect width="16" height="16" fill="#3FBDD0"/><text x="24" y="13">湿度  Humidity</text><text x="24" y="28" font-size="9" fill="#7A8699">#3FBDD0</text></g>
    </g>
    <g transform="translate(900,30)" font-size="11" fill="#E6ECF5">
      <g><rect width="16" height="16" fill="#A78BFA"/><text x="24" y="13">压力  Pressure</text><text x="24" y="28" font-size="9" fill="#7A8699">#A78BFA</text></g>
      <g transform="translate(0,40)"><rect width="16" height="16" fill="#FBBF24"/><text x="24" y="13">辅助  Aux</text><text x="24" y="28" font-size="9" fill="#7A8699">#FBBF24</text></g>
    </g>
    <g transform="translate(1120,30)" font-size="11" fill="#E6ECF5">
      <g><rect width="16" height="16" fill="#34D399"/><text x="24" y="13">设定  Setpoint</text><text x="24" y="28" font-size="9" fill="#7A8699">#34D399 虚线</text></g>
    </g>
  </g>

  <!-- ============ Typography ============ -->
  <text x="80" y="660" font-size="11" fill="#3FBDD0" letter-spacing="3">TYPOGRAPHY · 字体</text>
  <g transform="translate(80,675)">
    <rect width="600" height="180" fill="#0F1722" stroke="#2A3240"/>
    <text x="20" y="32" font-size="10" fill="#7A8699" letter-spacing="2">FONT · INTER · PingFang SC · Microsoft YaHei</text>
    <text x="20" y="62" font-size="22" font-weight="600" fill="#E6ECF5">温箱 · 环境试验设备控制系统</text>
    <text x="20" y="88" font-size="14" fill="#A6B0C2">Mission-Critical Environmental Test Control</text>
    <text x="20" y="120" font-size="11" fill="#7A8699">用于界面常规文本，覆盖中英文混排，支持 300/400/500/600 四档字重。</text>

    <text x="20" y="155" font-size="10" fill="#7A8699" letter-spacing="2">MONO · JETBRAINS MONO · CONSOLAS</text>
    <text x="20" y="172" font-family="'DejaVu Sans Mono',monospace" font-size="14" fill="#3FBDD0">85.2 ℃   65.0 %RH   1013.2 kPa</text>
  </g>

  <!-- ============ Component preview: device card ============ -->
  <text x="710" y="660" font-size="11" fill="#3FBDD0" letter-spacing="3">COMPONENT · 设备卡（关键组件）</text>
  <g transform="translate(710,675)">
    <rect width="610" height="180" fill="#0F1722" stroke="#2A3240"/>

    <!-- card 1 RUN -->
    <g transform="translate(20,20)">
      <rect width="180" height="140" fill="#11151C" stroke="#2A3240"/>
      <rect width="4" height="140" fill="#3FBDD0"/>
      <text x="14" y="22" font-size="11" fill="#E6ECF5" font-weight="600">TH-01</text>
      <text x="60" y="22" font-size="9" fill="#7A8699">A 区 · 标准温湿</text>
      <circle cx="160" cy="20" r="4" fill="#3FBDD0"/>
      <text x="14" y="48" font-size="9" fill="#7A8699">温度</text>
      <text x="14" y="68" font-family="'DejaVu Sans Mono',monospace" font-size="18" fill="#E6ECF5">85.2 <tspan font-size="10" fill="#7A8699">℃</tspan></text>
      <text x="14" y="86" font-size="9" fill="#7A8699">湿度</text>
      <text x="14" y="106" font-family="'DejaVu Sans Mono',monospace" font-size="18" fill="#E6ECF5">65.0 <tspan font-size="10" fill="#7A8699">%RH</tspan></text>
      <polyline fill="none" stroke="#3FBDD0" stroke-width="1.5" points="14,130 40,128 66,124 92,120 118,122 144,128 166,130"/>
    </g>

    <!-- card 2 ALARM -->
    <g transform="translate(220,20)">
      <rect width="180" height="140" fill="#11151C" stroke="#E0433A"/>
      <rect width="4" height="140" fill="#E0433A"/>
      <text x="14" y="22" font-size="11" fill="#E6ECF5" font-weight="600">TH-03</text>
      <text x="60" y="22" font-size="9" fill="#7A8699">A 区 · 标准温湿 1500L</text>
      <circle cx="160" cy="20" r="4" fill="#E0433A"/>
      <text x="14" y="48" font-size="9" fill="#7A8699">温度</text>
      <text x="14" y="68" font-family="'DejaVu Sans Mono',monospace" font-size="18" fill="#E0433A">152.8 <tspan font-size="10" fill="#7A8699">℃</tspan></text>
      <rect x="10" y="100" width="160" height="28" fill="#2A1416" stroke="#E0433A"/>
      <text x="18" y="118" font-size="10" fill="#E0433A">! E-1108 · 温度上限超限</text>
    </g>

    <!-- card 3 OFFLINE -->
    <g transform="translate(420,20)">
      <rect width="170" height="140" fill="#11151C" stroke="#3A4458"/>
      <rect width="4" height="140" fill="#5C6573"/>
      <text x="14" y="22" font-size="11" fill="#A6B0C2" font-weight="600">TH-07</text>
      <text x="60" y="22" font-size="9" fill="#7A8699">C 区 · 标准温湿 1500L</text>
      <circle cx="150" cy="20" r="4" fill="#5C6573"/>
      <g transform="translate(60,68)" opacity="0.4">
        <circle cx="0" cy="0" r="20" fill="none" stroke="#5C6573" stroke-width="2"/>
        <line x1="-15" y1="-15" x2="15" y2="15" stroke="#5C6573" stroke-width="2"/>
      </g>
      <text x="85" y="100" font-size="10" fill="#7A8699">通信超时</text>
      <text x="85" y="116" font-size="9" fill="#5C6573">19:43 起离线</text>
    </g>
  </g>
</svg>
