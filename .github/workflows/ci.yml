name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build + Test (windows-latest, .NET 8, Debug)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore EnviroEquipmentFinalEdition.sln

      - name: Build (Debug)
        run: dotnet build EnviroEquipmentFinalEdition.sln --configuration Debug --no-restore

      - name: Test (full solution)
        run: dotnet test EnviroEquipmentFinalEdition.sln --configuration Debug --no-build --logger "console;verbosity=normal"
